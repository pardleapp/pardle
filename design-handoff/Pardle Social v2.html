function Spark({hist,dir}){
  const w=300,h=32,max=Math.max(...hist),min=Math.min(...hist),rng=Math.max(1,max-min);
  const pts=hist.map((v,i)=>`${(i/(hist.length-1))*w},${h-((v-min)/rng)*(h-5)-3}`).join(' ');
  const col=dir==='down'?'var(--down)':'var(--up)';
  return <div className="bp-spark"><svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none"><polyline points={pts} fill="none" stroke={col} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/><circle cx={w} cy={h-((hist[hist.length-1]-min)/rng)*(h-5)-3} r="3.5" fill={col}/></svg></div>;
}

function AreaChart({hist,dir}){
  const w=320,h=148,max=Math.max(...hist),min=Math.min(...hist),rng=Math.max(1,max-min);
  const xy=hist.map((v,i)=>[(i/(hist.length-1))*w,h-((v-min)/rng)*(h-26)-14]);
  const line=xy.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const area='0,'+h+' '+line+' '+w+','+h;const col=dir==='down'?'var(--down)':'var(--up)';
  return <div className="chart"><svg viewBox={'0 0 '+w+' '+h} preserveAspectRatio="none">
    <defs><linearGradient id="bgrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor={col} stopOpacity="0.22"/><stop offset="1" stopColor={col} stopOpacity="0"/></linearGradient></defs>
    <polygon points={area} fill="url(#bgrad)"/>
    <polyline points={line} fill="none" stroke={col} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" vectorEffect="non-scaling-stroke"/>
    <line x1={xy[0][0]} y1="0" x2={xy[0][0]} y2={h} stroke="var(--muted)" strokeWidth="1" strokeDasharray="3 3" vectorEffect="non-scaling-stroke"/>
  </svg></div>;
}

function BetDetail({bet,onClose,onOpenPlayer}){
  const [list,setList]=useState(BET_COMMENTS[bet.id]||[]);const [txt,setTxt]=useState('');const [tailed,setTailed]=useState(false);const [shared,setShared]=useState(false);
  const send=()=>{if(txt.trim()){setList(l=>[...l,{au:'You',init:'YO',sharp:'·',text:txt.trim()}]);setTxt('');}};
  const updates=bet.updates||bet.tl||[];const tailers=bet.on||[];
  return <div className="detail">
    <div className="detail-head"><button className="detail-back" onClick={onClose}>←</button><div className="detail-title"><div className="nm">{bet.mine?'Your bet':(bet.name||bet.who)+"'s bet"}</div><div className="mk"><span className="tap-player" onClick={()=>onOpenPlayer&&onOpenPlayer(bet.player||bet.who)} style={{textDecoration:'underline',textDecorationColor:'var(--line)'}}>{bet.player||bet.who}</span> · {bet.mkt} · {bet.cur}{bet.stake}</div></div></div>
    <div className="detail-body">
      <div className="detail-hero"><div className="big" style={{color:bet.dir==='down'?'var(--down)':'var(--up)'}}>{bet.prob}%</div><div className="dd" style={{color:bet.dir==='down'?'var(--down)':'var(--up)'}}>{bet.dir==='up'?'▲':'▼'} live win probability</div></div>
      <AreaChart hist={bet.hist} dir={bet.dir}/>
      <div className="chart-x"><span>entry</span><span>now</span></div>
      <div className="chart-note">Today's trajectory · dashed line marks where you entered</div>
      <div className="detail-sec"><h4>Shot by shot</h4><div className="bp-thread" style={{borderTop:'none',paddingTop:0}}>{updates.map((u,i)=><div className="bp-upd" key={i}><span className={'ud '+u[2]}/><span className="ut">{u[0]}</span><span className={'uv '+u[2]}>{u[1]==='0'?'—':u[1]}</span></div>)}</div></div>
      <div className="detail-sec"><h4>On this bet · {tailers.length} tailing</h4>
        <div className="who-on" style={{marginLeft:0}}>{tailers.map(w=><Avatar key={w} initials={w} size={28}/>)}{tailers.length>0&&<span className="lbl">{tailers.length} from your crew tailed this</span>}</div>
        <div style={{marginTop:12}}>{list.map((c,i)=><div className="cmt-row" key={i}><Avatar initials={c.init} size={26}/><div className="cmt-bd"><span className="cmt-au">{c.au}</span>{c.sharp!=='·'&&<span className="cmt-sharp">{c.sharp}</span>}{c.text}</div></div>)}</div>
        <div className="cmt-form"><input value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Comment on this bet…"/><button className="send" onClick={send}>↑</button></div>
      </div>
    </div>
    <div className="detail-foot"><button className={'df-share'+(shared?' done':'')} onClick={()=>setShared(true)}>{shared?'Shared ✓':'Share to group'}</button>{!bet.mine&&<button className="df-tail" onClick={()=>setTailed(true)}>{tailed?'Tailed ✓':'Tail this bet'}</button>}</div>
  </div>;
}

    <div className="field"><div className="fl">Player</div><div className="chiprow">{PLIST.map(p=><button key={p} className={'bchip'+(player===p?' on':'')} onClick={()=>setPlayer(p)}>{p}</button>)}</div></div>
    <div className="field"><div className="fl">Market</div><div className="chiprow">{MARKETS.map((m,i)=><button key={i} className={'bchip'+(mkt===i?' on':'')} onClick={()=>{setMkt(i);setOdds(MARKETS[i][1]);}}>{m[0]}</button>)}</div></div>
    <div className="field"><div className="fl">Odds taken</div><input className="odds-input" type="text" value={odds} onChange={e=>setOdds(e.target.value)} placeholder="e.g. 7/4 · 2.75 · +175"/></div>
    <div className="field"><div className="fl">Stake</div><div className="stakerow"><div className="curtog">{['£','$'].map(c=><button key={c} className={cur===c?'on':''} onClick={()=>setCur(c)}>{c}</button>)}</div><input type="number" inputMode="decimal" value={stake} onChange={e=>setStake(e.target.value)} placeholder="0"/></div></div>
    <button className="sheet-confirm" disabled={!ok} onClick={()=>onAdd({player,mkt:MARKETS[mkt][0].toUpperCase(),cur,stake:pf(stake),odds})}>Track bet @ {odds||'—'}</button>
    <div className="preview-line">{ok?<>Posts to your feed as <b>{player} · {MARKETS[mkt][0]}</b> — your crew sees it live.</>:'Pick a player and a stake to track.'}</div>
  </div></>;
}

function sgBarStyle(v){const w=Math.min(Math.abs(v)/3,1)*50;return v<0?{left:(50-w)+'%',width:w+'%'}:{left:'50%',width:w+'%'};}
function splitSg(total,seed){const t=pf(total);const w=[[0.30,0.40,0.10,0.20],[0.22,0.30,0.18,0.30],[0.35,0.22,0.18,0.25]][seed%3];return w.map(x=>t*x);}
function Scorecard(){
  const [rd,setRd]=useState(3);
  const F=[0,1,2,3,4,5,6,7,8],B=[9,10,11,12,13,14,15,16,17];
  const s9=(a,idx)=>idx.reduce((x,i)=>x+a[i],0);
  const parColor=p=>p===3?'pc3':p===5?'pc5':'pc4';
  const sg=SC_ROUNDS[rd].map((s,i)=>HOLE_AVG[i]-s);
  const sgBg=v=>{const t=Math.max(-1,Math.min(1,v/1.3));if(Math.abs(t)<0.04)return undefined;return t>0?'oklch(0.62 0.16 150 / '+(t*0.5).toFixed(2)+')':'oklch(0.6 0.2 28 / '+(Math.abs(t)*0.5).toFixed(2)+')';};
  const fmtTp=t=>t===0?'E':t>0?'+'+t:''+t;
  const fmtSg=v=>(v>0?'+':'')+v.toFixed(2);
  const parF=s9(PAR,F),parB=s9(PAR,B);
  const sgF=s9(sg,F),sgB=s9(sg,B);
  const tpO=s9(SC_ROUNDS[rd],F)-parF,tpI=s9(SC_ROUNDS[rd],B)-parB;
  const scell=(i)=>{const s=SC_ROUNDS[rd][i],d=s-PAR[i];const c=d<=-2?'under eagle':d===-1?'under':d===1?'over':d>=2?'over dbl':'';return <td key={i} className={c}><span className="v">{s}</span></td>;};
  const Row=({label,cells,out,inn,tot,cls})=> <tr className={cls}><td className="lbl">{label}</td>{F.map(cells)}<td className="tot">{out}</td>{B.map(cells)}<td className="tot">{inn}</td><td className="tot grand">{tot}</td></tr>;
  return <>
    <div className="vavg-pills" style={{marginBottom:11}}>{[0,1,2,3].map(i=><button key={i} className={rd===i?'on':''} onClick={()=>setRd(i)}>R{i+1}</button>)}</div>
    <div className="scard"><table className="sctable">
      <thead><tr><th className="lbl">Hole</th>{F.map(i=><th key={i} className={parColor(PAR[i])}>{i+1}</th>)}<th className="tot">OUT</th>{B.map(i=><th key={i} className={parColor(PAR[i])}>{i+1}</th>)}<th className="tot">IN</th><th className="tot grand">TOT</th></tr></thead>
      <tbody>
        <Row label="Par" cells={(i)=><td key={i} className="parrowcell">{PAR[i]}</td>} out={parF} inn={parB} tot={parF+parB}/>
        <Row cls="rdsel" label={'R'+(rd+1)} cells={scell} out={fmtTp(tpO)} inn={fmtTp(tpI)} tot={fmtTp(tpO+tpI)}/>
        <Row cls="sgline" label="SG" cells={(i)=><td key={i} style={sgBg(sg[i])?{background:sgBg(sg[i])}:undefined}>{fmtSg(sg[i])}</td>} out={fmtSg(sgF)} inn={fmtSg(sgB)} tot={fmtSg(sgF+sgB)}/>
      </tbody></table></div>
    <div className="sc-legend"><span>○ under par&nbsp;&nbsp;□ over par</span><span><i style={{background:'oklch(0.62 0.16 150 / .5)'}}/>SG gained</span><span><i style={{background:'oklch(0.6 0.2 28 / .5)'}}/>SG lost</span></div>
  </>;
}

 'You':{init:'YO',role:'Admin',today:'+£186',dir:'up',hist:[20,40,60,120,150,186],record:'this week · 9 bets · 5 W',bets:[['R. Henley','OUTRIGHT','£50','5/2',54,'up'],['A. Smalley','TOP 5','£40','2.00',71,'up']]},
 'Theo':{init:'TH',role:'',today:'+£54',dir:'up',hist:[10,30,20,40,48,54],record:'this week · 7 bets · 4 W',bets:[['L. Åberg','TOP 10','£25','3.20',38,'down'],['E. Cole','TOP 20','£20','1.70',64,'up']]},
 'Sam':{init:'SA',role:'',today:'−£20',dir:'down',hist:[30,10,-5,-30,-10,-20],record:'this week · 6 bets · 2 W',bets:[['M. Brennan','UNDER 69.5 · R4','$100','1.90',46,'down']]},
 'Mia':{init:'MI',role:'',today:'−£40',dir:'down',hist:[20,0,-15,-35,-45,-40],record:'this week · 8 bets · 3 W',bets:[['A. Smalley','TOP 5','£30','2.00',71,'up'],['N. Echavarria','TOP 20','£20','1.60',58,'up']]},
};
function MemberProfile({name,onClose,onOpenPlayer}){
  const d=MEMBER_INFO[name]||{init:name.slice(0,2).toUpperCase(),role:'',today:'+£0',dir:'up',hist:[0,0],record:'—',bets:[]};
  const neg=d.dir==='down';
  return <div className="detail" style={{zIndex:64}}>
    <div className="detail-head"><button className="detail-back" onClick={onClose}>←</button><div className="detail-title"><div className="nm">{name}{d.role&&<span className="role-tag">{d.role}</span>}</div><div className="mk">In The Lads · {d.record}</div></div></div>
    <div className="detail-body">
      <div className="pl-hero"><Avatar initials={d.init} size={56}/><div><div className="nm">{name}</div><div className="pos">Today <b style={{color:neg?'var(--down)':'var(--up)'}}>{d.today}</b> · this tournament</div></div><button className="pl-follow">Nudge</button></div>
      <div className="detail-sec"><h4>P&L · this tournament</h4><AreaChart hist={d.hist} dir={d.dir}/><div className="chart-x"><span>R1</span><span>now</span></div></div>
      <div className="detail-sec"><h4>Open bets · {d.bets.length}</h4>{d.bets.length?d.bets.map((b,i)=><div className="mbet" key={i} onClick={()=>onOpenPlayer&&onOpenPlayer(b[0])}><div style={{flex:1,minWidth:0}}><div className="mbet-nm">{b[0]}<span className="mktchip">{b[1]}</span></div><div className="mbet-sub">{b[2]} @ {b[3]}</div></div><div className="mbet-prob" style={{color:b[5]==='down'?'var(--down)':'var(--up)'}}>{b[4]}%</div></div>):<div style={{fontSize:13,color:'var(--muted)'}}>No open bets right now.</div>}</div>
    </div>
    <div className="detail-foot"><button className="df-share">View full profile</button><button className="df-tail">Tail their slip</button></div>
  </div>;
}
const NOTIFS=[
 {ic:'🚀',tint:'up',t:'Your Henley outright jumped to 60%',s:'Birdie on 18 — he grabs the lead',tm:'now',unread:true},
 {ic:'🎉',tint:'up',t:'Your Smalley Top 5 cashed · +£40',s:'Settled — booked to your day',tm:'2m',unread:true},
 {ic:'📈',tint:'blue',t:'@golf-edge posted a new tip',s:'L. Åberg — Outright @ 12/1',tm:'8m',unread:true},
 {ic:'👥',tint:'tang',t:'Jordan tailed your Smalley Top 5',s:'The Lads',tm:'12m',unread:false},
 {ic:'⛳',tint:'up',t:'N. Echavarria — eagle on 17',s:'A player you follow',tm:'18m',unread:false},
 {ic:'🏆',tint:'tang',t:'You moved to 2nd in The Lads',s:"Today's P&L race",tm:'25m',unread:false},
];
function Notifications({onClose}){
  const [enabled,setEnabled]=useState(false);
  return <div className="detail" style={{zIndex:78}}>
    <div className="detail-head"><button className="detail-back" onClick={onClose}>←</button><div className="detail-title"><div className="nm">Notifications</div><div className="mk">The Lads · Charles Schwab Challenge</div></div></div>
    <div className="detail-body">
      {!enabled?<div className="np-card"><div className="np-ic">🔔</div><div className="np-bd"><div className="np-h">Turn on alerts</div><div className="np-s">Get pinged when your bets swing or settle, a tip drops, or your crew's on a heater.</div></div><button className="np-btn" onClick={()=>setEnabled(true)}>Enable</button></div>:<div className="np-on">🔔 Alerts on — bet swings, settles, tips &amp; group activity.<button onClick={()=>setEnabled(false)}>Manage</button></div>}
      <div className="nf-list">{NOTIFS.map((n,i)=><div key={i} className={'nf-row'+(n.unread?' unread':'')}><div className={'nf-ic '+n.tint}>{n.ic}</div><div className="nf-bd"><div className="nf-t">{n.t}</div><div className="nf-s">{n.s}</div></div><div className="nf-tm">{n.tm}</div></div>)}</div>
    </div>
  </div>;
}
const GAMES=[{key:'pros',ic:'⛳',name:'Pros',desc:"Guess today's mystery pro in 6",state:'Solved 4/6',done:true},{key:'holes',ic:'🏌️',name:'Holes',desc:'Name the famous hole',state:'Play',done:false},{key:'clubs',ic:'🏟️',name:'Clubhouses',desc:'Spot the course',state:'Play',done:false},{key:'conn',ic:'🔗',name:'Connections',desc:'Find the four groups',state:'2 mistakes',done:true}];
const GAME_CHALLENGE=[['JO','Jordan','3/6'],['MI','Mia','5/6'],['YO','You','4/6'],['TH','Theo','X']];
function GamesHub({onClose}){
  return <div className="detail" style={{zIndex:78}}>
    <div className="detail-head"><button className="detail-back" onClick={onClose}>←</button><div className="detail-title"><div className="nm">Daily games</div><div className="mk">Free to play · challenge your crew</div></div></div>
    <div className="detail-body">
      <div className="gm-streak">🔥 <b>12-day</b> streak · play today's to keep it alive</div>
      <div className="gm-grid">{GAMES.map(g=><div key={g.key} className="gm-card"><div className="gm-ic">{g.ic}</div><div className="gm-nm">{g.name}</div><div className="gm-desc">{g.desc}</div><div className={'gm-state'+(g.done?' done':'')}>{g.state}</div></div>)}</div>
      <div className="detail-sec"><h4>Today's Pros · The Lads</h4><div className="card" style={{padding:6}}>{GAME_CHALLENGE.map((r,i)=><div key={i} className={'racerow'+(r[1]==='You'?' you':'')}><span className="rk">{i+1}</span><Avatar initials={r[0]} size={30}/><span className="nm">{r[1]==='You'?<b>You</b>:r[1]}</span><span style={{fontFamily:"'IBM Plex Mono'",fontSize:14,fontWeight:700,color:r[2]==='X'?'var(--down)':'var(--ink)'}}>{r[2]}</span></div>)}</div>
        <button className="empty-pri" style={{marginTop:12,width:'100%'}}>Challenge your crew ↗</button></div>
    </div>
  </div>;
}
function App(){
  const [tab,setTab]=useState('feed');const [fmt,setFmt]=useState('frac');
  const [space,setSpace]=useState(SPACES[0]);const [sheetOpen,setSheetOpen]=useState(false);const [raceOpen,setRaceOpen]=useState(false);
  const [posts,setPosts]=useState(initPosts);const [freshId,setFreshId]=useState(null);const ei=useRef(0);
  const [detail,setDetail]=useState(null);const [addOpen,setAddOpen]=useState(false);const [player,setPlayer]=useState(null);const [prefill,setPrefill]=useState(null);const betOnPlayer=(p)=>{setPlayer(null);setPrefill(p);setAddOpen(true);};const [settle,setSettle]=useState(null);const [race,setRace]=useState(RACE.today);const openSettle=(p)=>setSettle({win:p.win,player:p.player,mkt:p.mkt,cur:p.cur,stake:p.stake,odds:p.odds||'2.00',profit:p.result?p.result.profit:'+£40',ret:p.result?p.result.ret:'£80'});const [newUser,setNewUser]=useState(false);const [onb,setOnb]=useState(false);const [groupSheet,setGroupSheet]=useState(false);const [smartDefault,setSmartDefault]=useState(false);const [share,setShare]=useState(null);const [member,setMember]=useState(null);const [notifOpen,setNotifOpen]=useState(false);const [gamesOpen,setGamesOpen]=useState(false);
  useEffect(()=>{let t;t=setInterval(()=>{
    if(ei.current>=EVENTS.length){clearInterval(t);return;} // single pass — no looping re-apply
    const e=EVENTS[ei.current];ei.current++;
    if(e.kind==='update'){
      setPosts(prev=>{const idx=prev.findIndex(p=>p.id===e.target);if(idx<0)return prev;
        const tgt=prev[idx];
        // guard: don't re-prepend an identical leading update
        if(tgt.updates[0] && tgt.updates[0][0]===e.upd[0])return prev;
        const np={...tgt,prob:e.prob,dir:e.upd[2],updates:[e.upd,...tgt.updates].slice(0,8)};
        const rest=prev.filter(p=>p.id!==e.target);return [np,...rest];});
      setFreshId(e.target);
    }else if(e.kind==='insert'){const np=e.post();setPosts(prev=>[np,...prev].slice(0,12));setFreshId(np.id);}else if(e.kind==='settle'){const res={profit:'+£40',ret:'£80'};setPosts(prev=>{const mp=prev.map(p=>p.id===e.target?{...p,settled:true,win:e.win,result:res}:p);const t=mp.find(p=>p.id===e.target);return t?[t,...mp.filter(p=>p.id!==e.target)]:mp;});setRace(r=>r.map(x=>x[1]==='You'?['YO','You','+£226','up']:x));setSettle(()=>{const t=initPosts.find(p=>p.id===e.target);return {win:e.win,player:t.player,mkt:t.mkt,cur:t.cur,stake:t.stake,odds:t.odds||'2.00',profit:res.profit,ret:res.ret};});setFreshId(e.target);}
    setTimeout(()=>setFreshId(k=>k),700);
  },4200);return ()=>clearInterval(t);},[]);
  const addBet=(d)=>{const id='nb'+(PK++);const np={type:'bet',id,init:'YO',name:'You',mine:true,player:d.player,mkt:d.mkt,cur:d.cur,stake:d.stake,odds:d.odds,prob:50,dir:'up',hist:[50,50],tm:'now',react:0,on:[],cmt:0,updates:[['Bet tracked — now sweating this','·','flat']]};setPosts(prev=>[np,...prev].slice(0,12));setFreshId(id);setAddOpen(false);setPrefill(null);setNewUser(false);setTab('feed');};
  return <div className="pv">
    <div className="pv-status"><span>10:43</span><span className="dots">
      <svg width="17" height="11" viewBox="0 0 17 11"><g fill="currentColor"><rect x="0" y="7" width="3" height="4" rx="1"/><rect x="4.5" y="5" width="3" height="6" rx="1"/><rect x="9" y="2.5" width="3" height="8.5" rx="1"/><rect x="13.5" y="0" width="3" height="11" rx="1"/></g></svg>
      <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><path d="M8 2.2c2 0 3.9.8 5.3 2.1l1.2-1.3A9.3 9.3 0 0 0 8 .4 9.3 9.3 0 0 0 1.5 3l1.2 1.3A7.5 7.5 0 0 1 8 2.2Z"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" fill="none" stroke="currentColor" opacity="0.5"/><rect x="2" y="2" width="17" height="8" rx="1.5" fill="currentColor"/><rect x="23" y="3.5" width="1.5" height="5" rx="0.75" fill="currentColor" opacity="0.5"/></svg>
    </span></div>
    <div className="pv-head"><div style={{display:'flex',alignItems:'center',gap:9}}><div className="wordmark">Par<b>dle</b></div><button className={'nu-toggle'+(newUser?' on':'')} onClick={()=>{const n=!newUser;setNewUser(n);setOnb(n);setTab('feed');}}>{newUser?'New user':'Demo'}</button></div><div style={{display:'flex',alignItems:'center',gap:8}}><button className="bell" onClick={()=>setGamesOpen(true)} aria-label="Games"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="2.5" y="7" width="19" height="10" rx="3.5"/><path d="M7 11v2.4M5.8 12.2h2.4"/><circle cx="15.5" cy="11.5" r=".6"/><circle cx="17.6" cy="13.6" r=".6"/></svg></button><button className="bell" onClick={()=>setNotifOpen(true)}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span className="bell-dot"/></button><SpaceSwitcher space={space} setSpace={setSpace} open={sheetOpen} setOpen={setSheetOpen}/></div></div>
    {tab==='feed'&&!newUser&&<Ticker onExpand={()=>setRaceOpen(true)} race={race}/>}
    {tab==='feed'?(newUser?<FeedEmpty onFollow={()=>setOnb(true)} onBet={()=>setAddOpen(true)}/>:<Feed posts={posts} freshId={freshId} onOpenBet={setDetail} onOpenPlayer={setPlayer} onSettle={openSettle} initialMode={smartDefault?'smart':'all'}/>)
      :tab==='bets'?(newUser?<BetsEmpty onBet={()=>setAddOpen(true)}/>:<Bets fmt={fmt} setFmt={setFmt} onOpenBet={setDetail}/>)
      :tab==='board'?<Leaderboard onOpenPlayer={setPlayer}/>
      :tab==='groups'?(newUser?<GroupsEmpty onCreate={()=>setGroupSheet(true)}/>:<Groups onExpand={()=>setRaceOpen(true)} openMember={setMember} openPlayer={setPlayer}/>)
      :(newUser?<SharpEmpty/>:<Sharp/>)}
    {(tab==='feed'||tab==='bets')&&!detail&&!addOpen&&!player&&!onb&&<button className="fab" onClick={()=>setAddOpen(true)}>＋</button>}
    {onb&&<Onboarding onClose={(sm)=>{setOnb(false);if(typeof sm==='boolean')setSmartDefault(sm);}}/>}
    {groupSheet&&<CreateGroup onClose={()=>setGroupSheet(false)} onCreate={()=>{setGroupSheet(false);setNewUser(false);setTab('groups');}}/>}
    {raceOpen&&<RaceSheet onClose={()=>setRaceOpen(false)} race={race}/>}
    {detail&&<BetDetail bet={detail} onClose={()=>setDetail(null)} onOpenPlayer={setPlayer}/>}
    {addOpen&&<AddBet onClose={()=>{setAddOpen(false);setPrefill(null);}} onAdd={addBet} prefill={prefill}/>}
    {settle&&<SettlementModal s={settle} onClose={()=>setSettle(null)} onShare={(x)=>{setSettle(null);setShare(x);}}/>}
    {share&&<ShareCard s={share} onClose={()=>setShare(null)}/>}
    {player&&<PlayerPage name={player} onClose={()=>setPlayer(null)} onBet={betOnPlayer}/>}
    {member&&<MemberProfile name={member} onClose={()=>setMember(null)} onOpenPlayer={(n)=>{setMember(null);setPlayer(n);}}/>}
    {notifOpen&&<Notifications onClose={()=>setNotifOpen(false)}/>}
    {gamesOpen&&<GamesHub onClose={()=>setGamesOpen(false)}/>}
    <div className="nav">{[['feed','Sweats',icoFeed],['bets','My bets',icoBets],['board','Leaders',icoBoard],['groups','Groups',icoGroup],['sharp','Sharp',icoSharp]].map(([k,l,ic])=>(<button key={k} className={tab===k?'on':''} onClick={()=>setTab(k)}><span className="ni">{ic}</span>{l}{k==='feed'&&tab!=='feed'&&<span className="badge">3</span>}</button>))}</div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
